services:
  subsonicbot:
    image: ghcr.io/rakkateichou/subsonicbot:latest
    container_name: subsonicbot
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_PATH=/app/data/users.db
      - BOT_TOKEN=your_telegram_bot_token
      - WEBHOOK_URL=https://your_server
      - BOT_DEBUG=False
    volumes:
      # Persist SQLite database (users.db) on the host machine under the ./data folder
      - ./data:/app/data
